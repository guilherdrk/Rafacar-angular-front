<mat-toolbar>
  <span>Financeiro</span>
  <span class="toolbar-spacer"></span>

  <button mat-raised-button color="primary" (click)="go('')" style="margin-right: 8px;">
    <mat-icon>home</mat-icon>
    Home
  </button>

  <button mat-stroked-button (click)="carregarTudo()" disabled="loading">
    <mat-icon>refresh</mat-icon>
    Atualizar
  </button>
</mat-toolbar>

<div class="page">
  <mat-card class="card">
    <div style="padding:16px; display:grid; gap:12px;">

      <form [formGroup]="form" style="display:grid; gap:12px; grid-template-columns: 160px 140px 200px auto; align-items:end;">
        <mat-form-field appearance="outline">
          <mat-label>Mês</mat-label>
          <mat-select formControlName="mes">
            <mat-option *ngFor="let m of meses" [value]="m.value">{{ m.label }}</mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Ano</mat-label>
          <input matInput type="number" formControlName="ano" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Histórico (meses)</mat-label>
          <mat-select formControlName="qtdMeses">
            <mat-option [value]="6">Últimos 6</mat-option>
            <mat-option [value]="12">Últimos 12</mat-option>
          </mat-select>
        </mat-form-field>

        <button mat-raised-button color="primary" (click)="carregarTudo()" [disabled]="loading">
          <mat-icon>search</mat-icon>
          Consultar
        </button>
      </form>

      <div *ngIf="loading" style="display:flex; justify-content:center; padding:16px;">
        <mat-spinner></mat-spinner>
      </div>

      <div *ngIf="!loading">
        <mat-card style="border-radius: 12px;">
          <div style="padding:16px;">
            <div style="font-size:12px; opacity:.7;">Lucro do mês selecionado</div>
            <div style="font-size:28px; font-weight:700;">
              R$ {{ lucroSelecionado ?? '—' }}
            </div>
          </div>
        </mat-card>

        <div style="margin-top:12px;" class="table-wrap">
          <table mat-table [dataSource]="historico" class="table">
            <ng-container matColumnDef="periodo">
              <th mat-header-cell *matHeaderCellDef>Período</th>
              <td mat-cell *matCellDef="let h">{{ h.label }}</td>
            </ng-container>

            <ng-container matColumnDef="lucro">
              <th mat-header-cell *matHeaderCellDef style="text-align: right;">Lucro</th>
              <td mat-cell *matCellDef="let h" class="num">R$ {{ h.lucro }}</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
        </div>
      </div>

    </div>
  </mat-card>
</div>
