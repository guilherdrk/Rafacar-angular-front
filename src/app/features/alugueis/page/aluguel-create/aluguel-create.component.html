<mat-toolbar>
  <span>Novo Aluguel</span>
  <span style="flex: 1 1 auto"></span>
  <button mat-stroked-button (click)="loadRefs()">
    <mat-icon>refresh</mat-icon>
    Recarregar
  </button>
</mat-toolbar>

<div class="content">
  <mat-card>
    <div style="display:grid; gap:12px; padding:16px;">
      <div *ngIf="loading" style="display:flex; justify-content:center; padding:16px;">
        <mat-spinner></mat-spinner>
      </div>

      <form *ngIf="!loading" [formGroup]="form">
        <mat-form-field appearance="outline">
          <mat-label>Cliente</mat-label>
          <mat-select formControlName="clienteId">
            <mat-option *ngFor="let c of clientes" [value]="c.id">
              {{ c.nomeCompleto }} ({{ c.cpf }})
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Veículo (disponível)</mat-label>
          <mat-select formControlName="veiculoId">
            <mat-option *ngFor="let v of veiculosDisponiveis" [value]="v.id">
              {{ v.marca }} {{ v.modelo }} - {{ v.placa }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <div class="data-form">
          <mat-form-field appearance="outline">
            <mat-label>Devolução prevista (data)</mat-label>
            <input matInput [matDatepicker]="picker" formControlName="devolucaoData" />
            <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Hora</mat-label>
            <input matInput type="time" formControlName="devolucaoHora" />
          </mat-form-field>
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Combustível na retirada</mat-label>
          <mat-select formControlName="combustivelRetirada">
            <mat-option *ngFor="let x of combustiveis" [value]="x.value">
              {{ x.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Diária customizada (opcional)</mat-label>
          <input matInput formControlName="precoDiariaCustomizada" placeholder="Ex: 199.90" />
        </mat-form-field>

        <div class="button-check">
          <button mat-raised-button color="primary" (click)="salvar()" [disabled]="saving">
            <mat-icon>check</mat-icon>
            Confirmar aluguel
          </button>
        </div>
      </form>
    </div>
  </mat-card>
</div>
