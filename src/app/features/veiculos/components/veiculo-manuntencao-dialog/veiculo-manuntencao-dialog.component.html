<mat-card>
  <h2 mat-dialog-title>Enviar para manutenção</h2>

  <div class="content" mat-dialog-content>
    <p>
      Veículo: <b>{{ data.placa || 'Sem placa' }}</b>
    </p>

    <form [formGroup]="form">
      <mat-form-field appearance="outline">
        <mat-label>Descrição</mat-label>
        <input matInput formControlName="descricao" />
        <mat-error *ngIf="form.get('descricao')?.hasError('required')"
          >Obrigatório</mat-error
        >
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Custo</mat-label>
        <input matInput formControlName="custo" placeholder="Ex: 300" />
        <mat-error *ngIf="form.get('custo')?.hasError('required')"
          >Obrigatório</mat-error
        >
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Data da manutenção</mat-label>
        <input matInput type="datetime-local" formControlName="dataManutencao" />
        <mat-hint>Deixe em branco para usar a data atual</mat-hint>
      </mat-form-field>
    </form>
  </div>

  <div mat-dialog-actions align="end">
    <button mat-button (click)="cancel()" [disabled]="saving">Cancelar</button>
    <button mat-raised-button color="warn" (click)="save()" [disabled]="saving">
      Enviar
    </button>
  </div>
</mat-card>
